<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Práctica DOM & Canvas - UNCP</title>
    <style>
        /* Usamos variables CSS para mejor rendimiento */
        :root { --bg-color: #f0f0f0; --canvas-border: #333; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: var(--bg-color); }
        canvas { border: 2px solid var(--canvas-border); background: white; margin-top: 20px; }
        .controls { margin-top: 10px; }
        .active { outline: 3px solid blue; }
    </style>
</head>
<body>
    <h1>Interacción con Canvas y DOM</h1>
    <div class="controls">
        <button id="btn-start">Iniciar</button>
        <button id="btn-stop">Detener</button>
        <input type="color" id="color-picker" value="#ff0000">
    </div>
    <canvas id="miLienzo" width="600" height="400"></canvas>

    <!-- 'defer' asegura que el JS se ejecute después de cargar el HTML -->
    <script src="app.js" defer></script>
</body>
</html>
